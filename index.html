<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Shark vs Plane</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f;font-family:'Courier New',monospace;color:#fff;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
body{display:flex;flex-direction:column;align-items:center;justify-content:center}
canvas{display:block;width:100%;height:100%;position:fixed;top:0;left:0;z-index:1}
#overlay{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(10,10,15,.92);transition:opacity .3s}
#overlay.hidden{opacity:0;pointer-events:none}
#title{font-size:clamp(28px,8vw,56px);font-weight:900;letter-spacing:4px;text-transform:uppercase;text-shadow:0 0 20px #0af,0 0 40px #0af;margin-bottom:8px;text-align:center}
#subtitle{font-size:clamp(11px,2.8vw,16px);opacity:.55;margin-bottom:clamp(20px,5vh,40px);letter-spacing:2px;text-align:center;padding:0 16px}
.btn{font-family:'Courier New',monospace;font-size:clamp(14px,3.5vw,20px);padding:12px 32px;background:transparent;border:2px solid #0af;color:#0af;cursor:pointer;letter-spacing:3px;text-transform:uppercase;transition:all .15s;-webkit-tap-highlight-color:transparent}
.btn:active{background:#0af;color:#000}
#goTitle{font-size:clamp(24px,7vw,48px);font-weight:900;margin-bottom:6px;color:#f44;display:none}
#goScore{font-size:clamp(13px,3.5vw,18px);margin-bottom:clamp(16px,4vh,28px);opacity:.65;display:none}
#hud{position:fixed;top:0;left:0;width:100%;padding:clamp(8px,2vw,14px) clamp(12px,3vw,18px);display:flex;justify-content:space-between;z-index:10;pointer-events:none;font-size:clamp(12px,3vw,16px);font-weight:700;letter-spacing:1px}
#scoreVal{color:#0f0}
#livesVal{color:#f44}
#controls{position:fixed;bottom:0;left:0;width:100%;z-index:10;display:none}
#controls-row{display:flex;width:100%}
.ctrl{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:clamp(10px,2.5vh,20px);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .08s;min-height:clamp(60px,14vh,100px)}
.ctrl:active{background:rgba(0,170,255,.08)}
.ctrl-icon{font-size:clamp(28px,7vw,48px);filter:drop-shadow(0 0 6px rgba(0,170,255,.35))}
.ctrl-label{font-size:clamp(9px,2.2vw,12px);opacity:.35;letter-spacing:2px;text-transform:uppercase;margin-top:2px}
#hint{position:fixed;bottom:clamp(2px,.5vh,6px);width:100%;text-align:center;font-size:clamp(8px,1.8vw,10px);opacity:.2;letter-spacing:1px;z-index:10;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <div id="title">Shark vs Plane</div>
  <div id="subtitle">Flick the right one through the hole</div>
  <button class="btn" id="startBtn">Start</button>
  <div id="goTitle">Game Over</div>
  <div id="goScore"></div>
  <button class="btn" id="restartBtn" style="display:none">Again</button>
</div>
<div id="hud" style="display:none">
  <div id="scoreVal">SCORE: 0</div>
  <div id="livesVal">LIVES: 3</div>
</div>
<div id="controls">
  <div id="controls-row">
    <div class="ctrl" id="sharkCtrl"><div class="ctrl-icon">&#x1F988;</div><div class="ctrl-label">Shark</div></div>
    <div class="ctrl" id="planeCtrl"><div class="ctrl-icon">&#x2708;</div><div class="ctrl-label">Plane</div></div>
  </div>
</div>
<div id="hint" style="display:none">TAP LEFT / RIGHT &bull; SWIPE &bull; ARROW KEYS</div>

<script>
const $ = id => document.getElementById(id);
const canvas = $('c');
const ctx = canvas.getContext('2d');

let W, H, dpr;
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

const G = {
  score: 0, lives: 3, wall: null, projs: [], fx: [],
  running: false, wallCooldown: 0, pendingWall: false, paused: false
};
const WALL_H = 30;
const PROJ_SPEED = 500;
const BASE_WALL_SPEED = 65;
const WALL_GAP = 0.8;

function rng() { return Math.random() < 0.5 ? 'shark' : 'plane'; }

function spawnWall() {
  const type = rng();
  const cutW = Math.min(80, W * 0.22);
  G.wall = { y: -WALL_H, type, cutX: (W - cutW) / 2, cutW, h: WALL_H };
  G.pendingWall = false;
}

function fire(type) {
  if (!G.running || !G.wall || G.grace > 0) return;
  const x = type === 'shark' ? W * 0.25 : W * 0.75;
  G.projs.push({ x, y: H * 0.82, type, vy: -PROJ_SPEED, r: 14 });
}

function boom(x, y, kind) {
  const ps = [];
  const n = kind === 'splat' ? 14 : kind === 'boom' ? 20 : 8;
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 50 + Math.random() * 180;
    const hue = kind === 'splat' ? 190 + Math.random() * 25
              : kind === 'boom' ? 15 + Math.random() * 30
              : 120 + Math.random() * 30;
    ps.push({
      x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd - (kind==='boom'?60:30),
      life: .35+Math.random()*.45, max: .35+Math.random()*.45,
      sz: kind==='pass' ? 2+Math.random()*3 : 3+Math.random()*5,
      col: `hsl(${hue},90%,${45+Math.random()*35}%)`
    });
  }
  G.fx.push({ x, y, kind, ps, age: 0, flash: 1 });
}

function collide(p) {
  if (!G.wall) return;
  const ok = p.type === G.wall.type;
  const cx = G.wall.cutX + G.wall.cutW / 2;
  const cy = G.wall.y + G.wall.h / 2;
  if (ok) { G.score++; boom(cx, cy, 'pass'); }
  else { G.lives--; boom(cx, cy, p.type==='shark'?'splat':'boom'); }
  G.wall = null;
  G.wallCooldown = WALL_GAP;
  G.projs = [];
}

function drawShark(x, y, s, a) {
  ctx.save(); ctx.globalAlpha = a||1; ctx.translate(x,y);
  const k = s/28; ctx.scale(k,k);
  ctx.fillStyle='#1a8ccc';
  ctx.beginPath(); ctx.moveTo(-14,0);
  ctx.quadraticCurveTo(-8,-10,8,-6); ctx.lineTo(14,0);
  ctx.lineTo(8,4); ctx.quadraticCurveTo(0,8,-10,4); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#0d5a8a';
  ctx.beginPath(); ctx.moveTo(-6,-4); ctx.lineTo(-2,-12); ctx.lineTo(2,-4); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#c0e8ff';
  ctx.beginPath(); ctx.arc(6,-2,2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.arc(6.8,-2,1.1,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawPlane(x, y, s, a) {
  ctx.save(); ctx.globalAlpha = a||1; ctx.translate(x,y);
  const k = s/28; ctx.scale(k,k);
  ctx.fillStyle='#999';
  ctx.beginPath(); ctx.moveTo(-14,0); ctx.lineTo(-4,-3); ctx.lineTo(14,0);
  ctx.lineTo(-4,3); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#666';
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-3,-10); ctx.lineTo(3,-10);
  ctx.lineTo(4,0); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-3,10); ctx.lineTo(3,10);
  ctx.lineTo(4,0); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#f44';
  ctx.beginPath(); ctx.moveTo(14,0); ctx.lineTo(10,-2); ctx.lineTo(10,2); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawIcon(type, x, y, s, a) {
  (type==='shark'?drawShark:drawPlane)(x,y,s,a);
}

function drawWall(w) {
  if (!w) return;
  const y = w.y, h = w.h;
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, y, W, h);
  ctx.rect(w.cutX+w.cutW, y, -w.cutW, h);
  ctx.clip('evenodd');
  ctx.fillStyle = '#2a2a3a';
  ctx.fillRect(0, y, W, h);
  ctx.restore();
  ctx.strokeStyle='#3a3a4f'; ctx.lineWidth=1.5;
  ctx.strokeRect(w.cutX, y, w.cutW, h);
  drawIcon(w.type, w.cutX+w.cutW/2, y+h/2, 16, .25);
}

function drawProjs() {
  G.projs.forEach(p => drawIcon(p.type, p.x, p.y, p.r*2, 1));
}

function drawFx(dt) {
  G.fx.forEach(e => {
    e.age += dt;
    e.flash = Math.max(0, e.flash - dt*5);
    if (e.flash > 0) {
      ctx.save(); ctx.globalAlpha = e.flash*.35;
      ctx.fillStyle = e.kind==='splat'?'#1a8ccc':e.kind==='boom'?'#f80':'#0f0';
      ctx.beginPath(); ctx.arc(e.x,e.y,35,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
    e.ps.forEach(p => {
      p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=220*dt; p.life-=dt;
      if (p.life>0) {
        ctx.save(); ctx.globalAlpha=(p.life/p.max)*.85;
        ctx.fillStyle=p.col; ctx.beginPath();
        ctx.arc(p.x,p.y,p.sz*(p.life/p.max),0,Math.PI*2); ctx.fill();
        ctx.restore();
      }
    });
  });
  G.fx = G.fx.filter(e => e.age < 1.4);
}

function drawBg() {
  ctx.fillStyle='#0a0a0f'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#13131f'; ctx.lineWidth=1;
  const g = 50;
  for (let y=0;y<H;y+=g){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  for (let x=0;x<W;x+=g){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
}

let lt = 0;
function loop(ts) {
  if (!G.running) return;
  const dt = Math.min((ts-lt)/1000, .05);
  lt = ts;

  drawBg();

  if (G.grace > 0) G.grace -= dt;

  if (G.wallCooldown > 0) {
    G.wallCooldown -= dt;
    if (G.wallCooldown <= 0 && !G.wall && !G.pendingWall) {
      G.pendingWall = true;
      spawnWall();
    }
  }

  if (G.wall) {
    const spd = BASE_WALL_SPEED + Math.floor(G.score/5)*22;
    G.wall.y += spd * dt;
    if (G.wall.y > H) {
      G.lives--;
      boom(W/2, H-50, 'boom');
      G.wall = null;
      G.wallCooldown = WALL_GAP;
    }
  }

  G.projs.forEach(p => { p.y += p.vy * dt; });

  if (G.wall) {
    for (let i = G.projs.length-1; i >= 0; i--) {
      const p = G.projs[i];
      if (p.y-p.r <= G.wall.y+G.wall.h && p.y+p.r >= G.wall.y) {
        collide(p);
        break;
      }
    }
  }

  G.projs = G.projs.filter(p => p.y+p.r > -20);

  drawWall(G.wall);
  drawProjs();
  drawFx(dt);

  $('scoreVal').textContent = 'SCORE: ' + G.score;
  $('livesVal').textContent = 'LIVES: ' + G.lives;

  if (G.lives <= 0) {
    G.running = false;
    $('goTitle').style.display = 'block';
    $('goScore').style.display = 'block';
    $('goScore').textContent = 'Final score: ' + G.score;
    $('restartBtn').style.display = 'inline-block';
    $('hud').style.display = 'none';
    $('controls').style.display = 'none';
    $('hint').style.display = 'none';
    drawBg();
    return;
  }

  requestAnimationFrame(loop);
}

function startGame() {
  $('overlay').classList.add('hidden');
  $('goTitle').style.display = 'none';
  $('goScore').style.display = 'none';
  $('restartBtn').style.display = 'none';
  $('hud').style.display = 'flex';
  $('controls').style.display = 'block';
  $('hint').style.display = 'block';
  G.score = 0; G.lives = 3; G.wall = null; G.projs = []; G.fx = [];
  G.wallCooldown = 0.5; G.pendingWall = false; G.grace = 0.3;
  G.running = true;
  lt = performance.now();
  requestAnimationFrame(loop);
}

$('startBtn').addEventListener('click', startGame);
$('restartBtn').addEventListener('click', startGame);

$('sharkCtrl').addEventListener('pointerdown', e => { e.preventDefault(); fire('shark'); });
$('planeCtrl').addEventListener('pointerdown', e => { e.preventDefault(); fire('plane'); });

let swipeX = 0, swipeY = 0, swiping = false;
document.addEventListener('pointerdown', e => {
  if (e.target.closest('.ctrl') || e.target.closest('.btn')) return;
  swipeX = e.clientX; swipeY = e.clientY; swiping = true;
});
document.addEventListener('pointerup', e => {
  if (!swiping || !G.running) { swiping = false; return; }
  swiping = false;
  const dx = e.clientX - swipeX;
  const dy = e.clientY - swipeY;
  if (Math.abs(dx) > 25 && Math.abs(dx) > Math.abs(dy)*0.6) {
    fire(dx < 0 ? 'shark' : 'plane');
  }
});

document.addEventListener('keydown', e => {
  if (!G.running) return;
  if (e.key==='ArrowLeft'||e.key==='a') fire('shark');
  if (e.key==='ArrowRight'||e.key==='d') fire('plane');
});

window.addEventListener('blur', () => { G.paused = G.running; G.running = false; });
window.addEventListener('focus', () => { if (G.paused && G.lives > 0) { G.running = true; G.paused = false; lt=performance.now(); requestAnimationFrame(loop); }});

(function drawPause() {
  if (G.paused) {
    ctx.fillStyle='#0a0a0f'; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='#13131f'; ctx.lineWidth=1;
    for(let y=0;y<H;y+=50){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    for(let x=0;x<W;x+=50){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    if(G.wall) drawWall(G.wall);
    drawProjs();
    ctx.fillStyle='rgba(0,0,0,.45)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff'; ctx.font='bold '+Math.max(16,W*0.06)+'px "Courier New",monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('PAUSED',W/2,H/2);
  }
  requestAnimationFrame(drawPause);
})();
</script>
</body>
</html>
